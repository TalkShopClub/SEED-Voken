# Fine-tune IBQ-8192 from pretrained (ImageNet) on GUI screenshots at 736x736.
# Data: ubuntu + win/mac (~427K train, ~4.3K val)
# Run: python finetune.py fit -c configs/IBQ/gpu/finetune_1024_ibq8192_ocr.yaml
seed_everything: true
trainer:
  accelerator: gpu
  strategy: ddp_find_unused_parameters_true
  devices: 1
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 10
  check_val_every_n_epoch: null
  val_check_interval: 10000
  num_sanity_val_steps: 0
  log_every_n_steps: 50
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: "checkpoints/ibq_finetune_1024_8192_ocr"
        save_top_k: 2
        monitor: "val/reconstruct_loss_epoch"
        mode: "min"
        save_last: True
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: src.IBQ.callbacks.wandb_image_logger.WandbReconstructionLogger
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "ibq-highres-1024"
      name: "finetune-ibq8192-736-ocr"
      save_dir: "results/ibq_finetune_1024_8192_ocr"

model:
  class_path: src.IBQ.models.ibqgan.IBQFromPretrained
  init_args:
    pretrained_path: "pretrained/IBQ-Tokenizer-8192"
    config_file: "config.yaml"
    ckpt_file: "imagenet256_8192.ckpt"
    lossconfig:
      target: src.IBQ.modules.losses.vqperceptual.VQLPIPSWithDiscriminator
      params:
        disc_conditional: False
        disc_in_channels: 3
        disc_start: 0
        disc_weight: 0.4
        quant_loss_weight: 1.0
        entropy_loss_weight: 0.05
        gen_loss_weight: 0.1
        lecam_loss_weight: 0.05
    learning_rate: 1e-4
    scheduler_type: None
    l2_normalize: False
    use_entropy_loss: True
    sample_minimization_weight: 1.0
    batch_maximization_weight: 1.0
    entropy_temperature: 0.01
    beta: 0.25
    use_ema: True
    resume_lr: null
    lr_drop_epoch: [8, 9]
    ocr_loss: true
    accumulate_grad_batches: 20
    gradient_clip_val: 1.0

data:
  class_path: finetune.DataModuleFromConfig
  init_args:
    batch_size: 3
    num_workers: 16
    train:
      target: src.IBQ.data.s3_images.LocalImages
      params:
        config:
          manifest_path: configs/IBQ/gpu/highres_1024_train_image_paths.json
          root: /workspace/AgentNet
          size: 736
          random_crop: true
          original_reso: false
          skip_files: false
          failed_samples_path: ""
    validation:
      target: src.IBQ.data.s3_images.LocalImages
      params:
        config:
          manifest_path: configs/IBQ/gpu/highres_1024_val_image_paths.json
          root: /workspace/AgentNet
          size: 736
          random_crop: false
          original_reso: false
          skip_files: false
          failed_samples_path: ""

ckpt_path: null
