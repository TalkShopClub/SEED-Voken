# Residual IBQ: Frozen L1 (IBQ-1024) + Trainable L2 (1024) residual codebook.
# Data: ubuntu_images_raw + win_mac_images_raw + imagenet-1k, random crop 384x384.
# Log GT vs reconstruction to WandB every 5000 steps. Checkpoint best 2.
# Run: bash scripts/train_residual_ibq.sh
seed_everything: true
trainer:
  accelerator: gpu
  strategy: ddp_find_unused_parameters_true
  devices: 1
  num_nodes: 1
  precision: bf16-mixed
  benchmark: true
  max_epochs: 20
  check_val_every_n_epoch: null
  val_check_interval: 30000
  num_sanity_val_steps: 0
  log_every_n_steps: 50
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: "/workspace/checkpoints/vqgan/residual_ibq_1024_384"
        save_top_k: 2
        monitor: "val/total_loss_epoch"
        mode: "min"
        save_last: True
        every_n_train_steps: 30000
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: src.IBQ.callbacks.wandb_image_logger.WandbStepReconstructionLogger
      init_args:
        log_every_n_steps: 1000
        num_images: 2
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "residual-ibq"
      name: "residual-ibq-1024-384"
      save_dir: "../../results/vqgan/residual_ibq_1024_384"

model:
  class_path: src.IBQ.models.ibqgan_residual.ResidualIBQ
  init_args:
    pretrained_path: "pretrained/IBQ-Tokenizer-1024"
    config_file: "config.yaml"
    # Level-2 residual codebook
    l2_n_embed: 1024
    l2_embed_dim: 256
    l2_beta: 0.25
    l2_use_entropy_loss: True
    l2_entropy_temperature: 0.01
    l2_sample_minimization_weight: 1.0
    l2_batch_maximization_weight: 1.0
    residual_scale: 1.0
    # Loss
    lossconfig:
      target: src.IBQ.modules.losses.vqperceptual.VQLPIPSWithDiscriminator
      params:
        disc_conditional: False
        disc_in_channels: 3
        disc_start: 0
        disc_weight: 0.4
        quant_loss_weight: 1.0
        entropy_loss_weight: 0.05
        gen_loss_weight: 0.1
        lecam_loss_weight: 0.05
    # Training
    learning_rate: 1e-4
    scheduler_type: None
    gradient_clip_val: 1.0
    use_ema: True
    lr_drop_epoch: [15, 18]
    lr_drop_rate: 0.1
    accumulate_grad_batches: 8

data:
  class_path: src.IBQ.data.multi_source.MultiSourceDataModule
  init_args:
    batch_size: 24
    num_workers: 16
    train:
      target: src.IBQ.data.multi_source.MultiSourceImageDataset
      params:
        local_roots:
          - /workspace/AgentNet/ubuntu_images_raw
          - /workspace/AgentNet/win_mac_images_raw
        imagenet_parquet_dir: /workspace/imagenet-1k/data
        imagenet_split: train
        size: 384
        random_crop: true
    validation:
      target: src.IBQ.data.s3_images.LocalImages
      params:
        config:
          root: data/val_2000
          manifest_path: ""
          size: 384
          random_crop: false
          original_reso: false
          skip_files: false
          failed_samples_path: ""

ckpt_path: null
